<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识图谱 · 腾讯游戏测试岗知识中枢</title>
  <meta name="description" content="树形知识图谱导航，按层级浏览所有知识点" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Russo+One&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/catalog.css" />
</head>
<body class="theme-dark">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- 顶部导航 -->
  <nav class="top-nav" id="topNav">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-title">GAME<span class="accent">TEST</span>.HUB</div>
          <div class="brand-sub">知识中枢 v2.0</div>
        </div>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link"><span class="nav-link-num">01</span><span>首页</span></a>
        <a href="catalog.html" class="nav-link active"><span class="nav-link-num">02</span><span>知识图谱</span></a>
        <a href="database.html" class="nav-link"><span class="nav-link-num">03</span><span>数据库</span></a>
        <a href="search.html" class="nav-link"><span class="nav-link-num">04</span><span>搜索</span></a>
        <a href="dashboard.html" class="nav-link"><span class="nav-link-num">05</span><span>数据仪表盘</span></a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="catalog-hero">
    <div class="container">
      <h1>📊 知识图谱</h1>
      <p>树形层级导航 · 28个核心知识点 · 6大领域 · 跨知识点关联</p>
    </div>
  </section>

  <!-- 树形容器 -->
  <div class="tree-container">
    <div class="tree-toolbar">
      <div class="tree-stats">
        <span><strong id="totalNodes">28</strong>知识点</span>
        <span><strong id="totalCategories">6</strong>领域</span>
        <span><strong id="expandedNodes">0</strong>已展开</span>
      </div>
      <div class="tree-actions">
        <button class="btn-tool" id="expandAll">全部展开</button>
        <button class="btn-tool" id="collapseAll">全部折叠</button>
        <button class="btn-tool" id="sortByDifficulty">按难度排序</button>
        <button class="btn-tool" id="sortByImportance">按重要性排序</button>
      </div>
    </div>
    <div class="tree" id="knowledgeTree"></div>
  </div>

  <!-- 详情侧栏 -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-panel-header">
      <h2 id="detailTitle">详情</h2>
      <button class="btn-close" id="closeDetail">✕</button>
    </div>
    <div class="detail-panel-body" id="detailBody"></div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 Tencent Game Test Knowledge Hub · v2.0</span>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script>
    // 分类图标映射
    const CATEGORY_ICONS = {
      '岗位核心': '🎯',
      '容灾测试': '⚡',
      '服务器架构': '🏗️',
      '网络协议': '🌐',
      '数据库': '💾',
      '性能测试': '🚀',
      '安全测试': '🔒',
      '自动化测试': '🤖',
      'CI/CD与DevOps': '🔄',
      '监控告警': '📡',
      'Python编程': '🐍',
      '案例库': '📚',
      'AI测试': '🧠'
    };

    // 树形数据组织
    function buildTree(data) {
      const groups = {};
      data.forEach(item => {
        const cat = item.category;
        if (!groups[cat]) groups[cat] = {};
        const sub = item.subcategory || '其他';
        if (!groups[cat][sub]) groups[cat][sub] = [];
        groups[cat][sub].push(item);
      });
      return groups;
    }

    function renderDifficulty(level) {
      let html = '<div class="tree-difficulty">';
      for (let i = 1; i <= 5; i++) {
        html += `<div class="dot ${i <= level ? 'filled d-' + level : ''}"></div>`;
      }
      html += '</div>';
      return html;
    }

    function renderLeafBadges(item) {
      let badges = '';
      if (item.videoUrl) badges += '<span class="leaf-badge video">▶ 视频</span>';
      if (item.codeExample) badges += '<span class="leaf-badge code">⟨/⟩ 代码</span>';
      if (item.quiz) badges += '<span class="leaf-badge quiz">? 测验</span>';
      if (item.importance >= 5) badges += '<span class="leaf-badge new">★ 重点</span>';
      return badges;
    }

    function renderTree(data) {
      const tree = buildTree(data);
      const root = document.getElementById('knowledgeTree');
      root.innerHTML = '';
      let totalLeaves = 0;

      Object.keys(tree).forEach(category => {
        const subcats = tree[category];
        const catCount = Object.values(subcats).reduce((s, arr) => s + arr.length, 0);
        totalLeaves += catCount;

        const node = document.createElement('div');
        node.className = 'tree-node';
        node.dataset.category = category;
        node.innerHTML = `
          <div class="tree-row" data-cat="${category}">
            <div class="tree-toggle">▶</div>
            <div class="tree-icon">${CATEGORY_ICONS[category] || '📁'}</div>
            <div class="tree-title">${category}</div>
            ${renderDifficulty(3)}
            <div class="tree-count">${catCount}</div>
          </div>
          <div class="tree-children">
            ${Object.keys(subcats).map(sub => `
              <div class="tree-leaf">
                <div class="leaf-row" style="padding-left:1.5rem; background:transparent; font-weight:600; color:var(--c-text-muted); cursor:default; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.05em;">
                  <div class="leaf-icon">└</div>
                  <div class="leaf-content">${sub}</div>
                </div>
                ${subcats[sub].map(item => `
                  <a class="leaf-row" data-id="${item.id}" href="javascript:void(0)">
                    <div class="leaf-icon">📄</div>
                    <div class="leaf-content">
                      <div class="leaf-title">${item.title}</div>
                      <div class="leaf-meta">
                        ${renderLeafBadges(item)}
                        <span>难度 ${item.difficulty}/5</span>
                      </div>
                    </div>
                    ${renderDifficulty(item.difficulty)}
                  </a>
                `).join('')}
              </div>
            `).join('')}
          </div>
        `;
        root.appendChild(node);
      });

      document.getElementById('totalNodes').textContent = totalLeaves;
      document.getElementById('totalCategories').textContent = Object.keys(tree).length;
    }

    // 详情面板
    function showDetail(id) {
      const item = KNOWLEDGE_BASE.find(k => k.id === id);
      if (!item) return;
      document.getElementById('detailTitle').textContent = item.title;
      const body = document.getElementById('detailBody');
      const tagsHtml = (item.tags || []).map(t => `<span class="tag">#${t}</span>`).join('');
      const relatedHtml = (item.relatedIds || []).length > 0 ? `
        <div class="related-section">
          <h4>关联知识点</h4>
          <div class="related-list">
            ${item.relatedIds.map(rid => {
              const rel = KNOWLEDGE_BASE.find(k => k.id === rid);
              if (!rel) return '';
              return `<div class="related-item" onclick="showDetail('${rel.id}'); event.stopPropagation();">🔗 ${rel.title}</div>`;
            }).join('')}
          </div>
        </div>
      ` : '';

      body.innerHTML = `
        <div class="detail-meta">${tagsHtml}</div>
        <div class="detail-summary">${item.summary}</div>
        <div class="detail-content">${markdownToHtml(item.content || '')}</div>
        ${item.videoUrl ? `<div style="margin-top:1.5rem; padding:1rem; background:var(--c-bg); border-radius:6px;"><strong style="color:var(--c-accent-pink);">▶ 视频演练：</strong><a href="${item.videoUrl}" target="_blank" style="color:var(--c-primary);">${item.videoUrl}</a></div>` : ''}
        <div class="detail-actions">
          <button class="btn-primary" onclick="alert('已收藏：' + decodeURIComponent('${encodeURIComponent(item.title)}'))">⭐ 收藏</button>
          <button class="btn-secondary" onclick="window.print()">🖨 打印</button>
        </div>
        ${relatedHtml}
        <div style="margin-top:1.5rem; padding:0.75rem; background:var(--c-bg); border-radius:6px; font-size:0.8rem; color:var(--c-text-muted);">
          <strong>📚 数据来源：</strong>${item.source || '多源综合'}
        </div>
      `;
      document.getElementById('detailPanel').classList.add('open');
    }

    // 简易 Markdown 渲染
    function markdownToHtml(md) {
      if (!md) return '';
      return md
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/^\- (.*$)/gim, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^([^<].*)$/gim, '<p>$1</p>')
        .replace(/<p><\/p>/g, '')
        .replace(/<p>(<h[1-3]>.*<\/h[1-3]>)<\/p>/g, '$1')
        .replace(/<p>(<ul>.*<\/ul>)<\/p>/gs, '$1')
        .replace(/<p>(<pre>.*<\/pre>)<\/p>/gs, '$1')
        .replace(/<p>(<blockquote>.*<\/blockquote>)<\/p>/g, '$1');
    }

    // 事件绑定
    document.addEventListener('DOMContentLoaded', () => {
      renderTree(KNOWLEDGE_BASE);

      // 展开/折叠
      document.getElementById('knowledgeTree').addEventListener('click', e => {
        const row = e.target.closest('.tree-row[data-cat]');
        const leaf = e.target.closest('.leaf-row[data-id]');
        if (row && !e.target.closest('.leaf-row')) {
          const node = row.parentElement;
          node.classList.toggle('expanded');
          updateExpandedCount();
        } else if (leaf) {
          e.preventDefault();
          showDetail(leaf.dataset.id);
        }
      });

      document.getElementById('closeDetail').onclick = () => {
        document.getElementById('detailPanel').classList.remove('open');
      };

      // 全部展开/折叠
      document.getElementById('expandAll').onclick = () => {
        document.querySelectorAll('.tree-node').forEach(n => n.classList.add('expanded'));
        updateExpandedCount();
      };
      document.getElementById('collapseAll').onclick = () => {
        document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('expanded'));
        updateExpandedCount();
      };

      // 排序
      document.getElementById('sortByDifficulty').onclick = () => {
        const sorted = [...KNOWLEDGE_BASE].sort((a, b) => b.difficulty - a.difficulty);
        renderTree(sorted);
      };
      document.getElementById('sortByImportance').onclick = () => {
        const sorted = [...KNOWLEDGE_BASE].sort((a, b) => b.importance - a.importance);
        renderTree(sorted);
      };

      // 默认展开前2个分类
      const nodes = document.querySelectorAll('.tree-node');
      if (nodes[0]) nodes[0].classList.add('expanded');
      if (nodes[1]) nodes[1].classList.add('expanded');
      updateExpandedCount();
    });

    function updateExpandedCount() {
      document.getElementById('expandedNodes').textContent =
        document.querySelectorAll('.tree-node.expanded').length;
    }

    window.showDetail = showDetail;
  </script>
</body>
</html>
