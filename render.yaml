services:
  - type: web
    name: tencent-game-test-hub
    env: static
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /
        destination: /index.html
      - type: rewrite
        source: /catalog
        destination: /catalog.html
      - type: rewrite
        source: /database
        destination: /database.html
      - type: rewrite
        source: /search
        destination: /search.html
      - type: rewrite
        source: /dashboard
        destination: /dashboard.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
